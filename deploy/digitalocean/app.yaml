# DigitalOcean App Platform Configuration for RTL-Gen AI
# Deploy using: doctl apps create --spec app.yaml

name: rtl-gen-ai
region: nyc

services:
  - name: web
    github:
      repo: yourusername/rtl-gen-ai
      branch: main
    build_command: pip install -r requirements.txt
    run_command: streamlit run app.py --server.port $PORT --server.headless true
    http_port: 8080
    instance_count: 1
    instance_size_slug: professional-xs
    
    # Environment variables
    envs:
      - key: STREAMLIT_SERVER_HEADLESS
        value: "true"
      - key: STREAMLIT_SERVER_PORT
        value: "8080"
      - key: DATABASE_URL
        value: ${db.DATABASE_URL}
        scope: RUN_AND_BUILD_TIME
    
    # Secrets from DigitalOcean
    envs:
      - key: ANTHROPIC_API_KEY
        value: ${ANTHROPIC_API_KEY}
        type: SECRET
        scope: RUN_TIME
      - key: DEEPSEEK_API_KEY
        value: ${DEEPSEEK_API_KEY}
        type: SECRET
        scope: RUN_TIME
    
    # Health check
    health_check:
      http_path: /health
      http_port: 8080
      timeout_seconds: 5
      initial_delay_seconds: 10
      period_seconds: 10
      success_threshold: 1
      failure_threshold: 5
    
    # Routes
    routes:
      - path: /
        preserve_path_prefix: true
    
    # Logs
    log_destinations:
      - name: app-logs
        datadog:
          api_key: ${DATADOG_API_KEY}
          type: SECRET

databases:
  - name: db
    engine: PG
    version: "15"
    production: true
    size: db-s-1vcpu-1gb

static_sites:
  - name: docs
    github:
      repo: yourusername/rtl-gen-ai
      branch: main
      deploy_on_push: true
    source_dir: docs
    routes:
      - path: /docs
