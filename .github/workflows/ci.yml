name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run unit tests
        run: |
          pytest tests/test_unit.py -v --tb=short --cov=. --cov-report=xml || true

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()

  test-guaranteed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Test guaranteed flow templates
        run: |
          python -c "
          from guaranteed_flow import build_from_template, classify_design

          templates = ['adder', 'counter', 'fifo', 'spi_master', 'i2c_master', 'ram', 'fsm']
          for t in templates:
              rtl, tb = build_from_template('test_' + t, f'8-bit {t}')
              assert 'module' in rtl, f'{t} RTL missing module'
              assert 'endmodule' in rtl, f'{t} RTL missing endmodule'
              assert 'module' in tb, f'{t} TB missing module'
              print(f'PASS: {t} template')
          print('All templates validated')
          "
