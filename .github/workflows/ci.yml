name: RTL-Gen AI CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  sonar:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: SonarCloud Scan
      uses: SonarSource/sonarcloud-github-action@v4
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: "pip"

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install pytest pytest-timeout
        pip install reportlab fastapi uvicorn sentry-sdk

    - name: Check syntax (all Python files)
      run: |
        python -m py_compile full_flow.py
        python -m py_compile app.py
        python -m py_compile database.py
        python -m py_compile guaranteed_flow.py
        python -m py_compile verilog_generator.py
        python -m py_compile report_generator.py
        python -m py_compile api.py
        echo "All files syntax OK"

    - name: Check imports
      run: |
        python -c "import full_flow; print('OK: full_flow')"
        python -c "import database; print('OK: database')"
        python -c "import guaranteed_flow; print('OK: guaranteed_flow')"
        python -c "import verilog_generator; print('OK: verilog_generator')"
        python -c "import report_generator; print('OK: report_generator')"
        python -c "import api; print('OK: api')"

    - name: Check templates (9/9 required)
      run: |
        python -c "
        from guaranteed_flow import TEMPLATES_RTL, TEMPLATES_TB
        required = ['counter','adder','shift_reg','mux',
                    'alu','fsm','uart_tx',
                    'spi_master','i2c_master']
        missing_rtl = [t for t in required
                       if t not in TEMPLATES_RTL]
        missing_tb  = [t for t in required
                       if t not in TEMPLATES_TB]
        if missing_rtl:
            print('MISSING RTL:', missing_rtl)
            exit(1)
        if missing_tb:
            print('MISSING TB:', missing_tb)
            exit(1)
        print(f'All {len(required)} templates present')
        "

    - name: Check classification (7/7 required)
      run: |
        python -c "
        from guaranteed_flow import classify_design, TEMPLATES_RTL
        tests = [
            ('UART transmitter', 'uart_tx'),
            ('4-bit counter', 'counter'),
            ('8-bit adder', 'adder'),
            ('ALU operations', 'alu'),
            ('state machine FSM', 'fsm'),
            ('shift register', 'shift_reg'),
            ('multiplexer mux', 'mux'),
        ]
        passed = 0
        for desc, expected in tests:
            got = classify_design(desc)['type']
            has_tmpl = got in TEMPLATES_RTL
            if has_tmpl:
                passed += 1
            else:
                print(f'FAIL: {desc} -> {got} (no template)')
        print(f'Classification: {passed}/{len(tests)}')
        if passed < len(tests):
            exit(1)
        "

    - name: Run unit tests
      run: |
        python -m pytest -m unit -v \
          --timeout=30 \
          --tb=short \
          2>&1

    - name: Verify API can start
      run: |
        python -c "
        from api import app
        from fastapi.testclient import TestClient
        client = TestClient(app)
        response = client.get('/api/health')
        assert response.status_code == 200
        data = response.json()
        assert data['status'] == 'healthy'
        print('API health check: PASS')
        "
