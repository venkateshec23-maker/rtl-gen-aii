name: RTL-Gen AI CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        pip install pytest pytest-cov
        pip install reportlab || true

    - name: Run unit tests only
      run: |
        python -m pytest -m unit -v \
          --tb=short \
          --timeout=60 \
          2>&1 || true

    - name: Check imports
      run: |
        python -c "import full_flow; print('full_flow OK')"
        python -c "import verilog_generator; print('generator OK')"
        python -c "import database; print('database OK')"
        python -c "import guaranteed_flow; print('guaranteed OK')"

    - name: Check syntax all files
      run: |
        python -m py_compile full_flow.py
        python -m py_compile app.py
        python -m py_compile database.py
        python -m py_compile guaranteed_flow.py
        python -m py_compile verilog_generator.py
        python -m py_compile universal_rtl_generator.py
        python -m py_compile test_lvs_universal.py
        python -m py_compile report_generator.py
        echo "All files syntax OK"

    - name: Verify templates exist
      run: |
        python -c "
        from pathlib import Path
        templates = [
            'counter', 'adder', 'shift_reg',
            'mux', 'alu', 'fsm', 'uart_tx',
            'spi_master', 'i2c_master', 'fifo', 'ram'
        ]
        from guaranteed_flow import TEMPLATES_RTL, TEMPLATES_TB
        missing_rtl = []
        missing_tb = []
        for t in templates:
            if t not in TEMPLATES_RTL:
                missing_rtl.append(t)
            else:
                print(f'RTL OK: {t}')
            if t not in TEMPLATES_TB:
                missing_tb.append(t)
            else:
                print(f'TB OK: {t}')
        if missing_rtl:
            print(f'Missing RTL templates: {missing_rtl}')
        if missing_tb:
            print(f'Missing TB templates: {missing_tb}')
        if not missing_rtl and not missing_tb:
            print('All templates present')
        "

    - name: Verify classification works
      run: |
        python -c "
        from guaranteed_flow import classify_design
        tests = [
            ('UART transmitter', 'uart_tx'),
            ('SPI master',       'spi_master'),
            ('I2C write',        'i2c_master'),
            ('4-bit counter',    'counter'),
            ('8-bit adder',      'adder'),
        ]
        all_pass = True
        for desc, expected in tests:
            got = classify_design(desc)['type']
            ok = got == expected
            if not ok: all_pass = False
            print(f'  {\"OK\" if ok else \"FAIL\"}: \"{desc}\" -> {got} (expected {expected})')
        print('Classification:', 'ALL PASS' if all_pass else 'SOME FAIL')
        "
