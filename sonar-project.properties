# SonarCloud configuration for RTL-Gen AI
# https://sonarcloud.io/project/overview?id=venkateshec23-maker_rtl-gen-aii

sonar.projectKey=venkateshec23-maker_rtl-gen-aii
sonar.organization=venkateshec23-maker
sonar.projectName=RTL-Gen AI

sonar.sources=python/,app.py,api.py,full_flow.py,guaranteed_flow.py,universal_rtl_generator.py
sonar.tests=tests/
sonar.test.inclusions=tests/**/*.py

sonar.python.version=3.9,3.10,3.11,3.12
sonar.python.coverage.reportPaths=coverage.xml

sonar.exclusions=**/__pycache__/**,**/.venv/**,**/site/**,**/node_modules/**,deploy/**,data/**,outputs/**,openlane/**
sonar.python.exclusions=python/__main__.py,python/__init__.py

sonar.sourceEncoding=UTF-8
sonar.qualitygate.wait=false
